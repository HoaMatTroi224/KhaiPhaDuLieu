  grobid:
    image: lfoppiano/grobid:0.8.0
    container_name: grobid
    ports:
      - "8070:8070"
    restart: unless-stopped
    networks:
      - app-network  

  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      - grobid
    env_file:
      - ./backend/.env
    environment:
      - GROBID_SERVER=http://grobid:8070
    restart: unless-stopped
    volumes:
      - ./backend:/app
    networks:
      - app-network  

networks:
  app-network:
    driver: bridge