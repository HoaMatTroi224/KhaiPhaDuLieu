version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

    volumes:
      - ./backend:/app

    networks:
      - app-network

networks:
  app-network:
    driver: bridge