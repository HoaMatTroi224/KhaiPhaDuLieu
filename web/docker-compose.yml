version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    environment:
      REDIS_URL: redis://redis:6379/0

    depends_on:
      - redis

    restart: unless-stopped

    volumes:
      - ./backend:/app

    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
